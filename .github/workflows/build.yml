name: Build Temple App APK v1.2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openjdk-17-jdk wget unzip
          java -version

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt/
          sudo ln -sf /opt/gradle-8.4/bin/gradle /usr/local/bin/gradle
          gradle --version

      - name: Install Android SDK
        run: |
          sudo mkdir -p /opt/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          sudo unzip -q /tmp/cmdline-tools.zip -d /opt/android-sdk/cmdline-tools
          sudo mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest
          sudo chmod -R 777 /opt/android-sdk
          export PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build complete Android project from scratch
        run: |
          # Create full Android project structure from scratch
          mkdir -p /tmp/app/app/src/main/java/com/kallichi/temple
          mkdir -p /tmp/app/app/src/main/assets
          mkdir -p /tmp/app/app/src/main/res/mipmap-anydpi-v26
          mkdir -p /tmp/app/app/src/main/res/drawable
          mkdir -p /tmp/app/app/src/main/res/values
          mkdir -p /tmp/app/app/src/main/res/layout
          mkdir -p /tmp/app/gradle/wrapper

          # Write all files from base64
          echo "b3JnLmdyYWRsZS5qdm1hcmdzPS1YbXgyMDQ4bSAtRGZpbGUuZW5jb2Rpbmc9VVRGLTgKYW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmFuZHJvaWQuZW5hYmxlSmV0aWZpZXI9dHJ1ZQo=" | base64 -d > /tmp/app/gradle.properties
          echo "cGx1Z2lucyB7CiAgICBpZCAnY29tLmFuZHJvaWQuYXBwbGljYXRpb24nIHZlcnNpb24gJzguMi4yJyBhcHBseSBmYWxzZQp9Cg==" | base64 -d > /tmp/app/build.gradle
          echo "" | base64 -d > /tmp/app/settings.gradle
          echo "" | base64 -d > /tmp/app/app/build.gradle
          echo "LWtlZXAgY2xhc3MgY29tLmthbGxpY2hpLnRlbXBsZS5NYWluQWN0aXZpdHkkQW5kcm9pZEJyaWRnZSB7ICo7IH0KLWtlZXBjbGFzc21lbWJlcnMgY2xhc3MgKiB7CiAgICBAYW5kcm9pZC53ZWJraXQuSmF2YXNjcmlwdEludGVyZmFjZSA8bWV0aG9kcz47Cn0K" | base64 -d > /tmp/app/app/proguard-rules.pro
          echo "" | base64 -d > /tmp/app/app/src/main/AndroidManifest.xml
          echo "" | base64 -d > /tmp/app/app/src/main/java/com/kallichi/temple/MainActivity.java
          echo "" | base64 -d > /tmp/app/app/src/main/assets/index.html
          echo "" | base64 -d > /tmp/app/app/src/main/res/layout/activity_main.xml
          echo "" | base64 -d > /tmp/app/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          cp /tmp/app/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml /tmp/app/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          echo "" | base64 -d > /tmp/app/app/src/main/res/drawable/ic_launcher_foreground.xml
          echo "" | base64 -d > /tmp/app/app/src/main/res/values/colors.xml
          echo "PHJlc291cmNlcz4KICAgIDxzdHJpbmcgbmFtZT0iYXBwX25hbWUiPkthbGxpY2hpIEFtbWFuIFRlbXBsZTwvc3RyaW5nPgo8L3Jlc291cmNlcz4K" | base64 -d > /tmp/app/app/src/main/res/values/strings.xml
          echo "" | base64 -d > /tmp/app/app/src/main/res/values/themes.xml

          echo "✅ Project structure created"
          ls /tmp/app/
          wc -c /tmp/app/app/src/main/assets/index.html

      - name: Generate Gradle wrapper
        run: |
          cd /tmp/app
          export ANDROID_HOME=/opt/android-sdk
          gradle wrapper --gradle-version 8.4
          ls -lh gradle/wrapper/

      - name: Build APK
        run: |
          cd /tmp/app
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools
          chmod +x gradlew
          gradle assembleDebug --stacktrace

      - name: Find and stage APK
        run: |
          find /tmp/app -name "*.apk"
          mkdir -p /tmp/apk-output
          APK=$(find /tmp/app -name "*.apk" | head -1)
          if [ -z "$APK" ]; then echo "No APK found!"; exit 1; fi
          cp "$APK" /tmp/apk-output/KallichiAmmanTemple.apk
          echo "✅ APK: $(du -sh /tmp/apk-output/KallichiAmmanTemple.apk)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: KallichiAmmanTemple-APK-v1.2
          path: /tmp/apk-output/KallichiAmmanTemple.apk
          retention-days: 30
